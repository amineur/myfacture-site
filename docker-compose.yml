services:
  dashboard-media:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashboard-media
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - AUTOMATION_API_KEY=${AUTOMATION_API_KEY}
      - QONTO_CLIENT_ID=${QONTO_CLIENT_ID}
      - QONTO_CLIENT_SECRET=${QONTO_CLIENT_SECRET}
      - QONTO_REDIRECT_URI=${QONTO_REDIRECT_URI}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - INDES_JWT_TOKEN=${INDES_JWT_TOKEN}
    volumes:
      - ./public/uploads:/app/public/uploads
    networks:
      - proxy_net
      - core_new_core_net
    ports:
      - "3008:3000"

  n8n:
    image: n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=n8n.urban-hit.fr
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.urban-hit.fr/
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - GENERIC_TIMEZONE=Europe/Paris
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    networks:
      - proxy_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.urban-hit.fr`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=letsencrypt"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      - "traefik.docker.network=proxy_net"

networks:
  proxy_net:
    external: true
  core_new_core_net:
    external: true

volumes:
  n8n_data:
