name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 83.228.217.205
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            DEPLOY_DIR="/home/ubuntu/dashboard-media"
            echo "=== Setup repo ==="
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo "No git repo found, cloning..."
              rm -rf "$DEPLOY_DIR.bak"
              [ -d "$DEPLOY_DIR" ] && mv "$DEPLOY_DIR" "$DEPLOY_DIR.bak"
              git clone https://github.com/amineur/myfacture-site.git "$DEPLOY_DIR"
              [ -d "$DEPLOY_DIR.bak/uploads" ] && cp -r "$DEPLOY_DIR.bak/uploads" "$DEPLOY_DIR/public/uploads"
              [ -f "$DEPLOY_DIR.bak/.env" ] && cp "$DEPLOY_DIR.bak/.env" "$DEPLOY_DIR/.env"
              [ -d "$DEPLOY_DIR.bak/node_modules" ] && mv "$DEPLOY_DIR.bak/node_modules" "$DEPLOY_DIR/node_modules"
            fi
            cd "$DEPLOY_DIR"
            echo "=== Git pull ==="
            git pull origin main || (git fetch origin main && git reset --hard origin/main)
            echo "=== Install deps ==="
            npm install --production=false
            echo "=== Prisma generate ==="
            npx prisma generate
            echo "=== Rebuild ==="
            npm run build
            echo "=== Restart container ==="
            docker compose down dashboard-media || true
            docker compose up -d dashboard-media
            echo "=== Prisma db push (inside container) ==="
            sleep 5
            docker exec dashboard-media npx prisma db push --accept-data-loss || echo "Prisma db push skipped"
            echo "=== Deploy done ==="
